# PostgreSQL Database Connection Settings
# Note: Use port 5432 since your docker container maps host port 5432 to container port 5432
spring.datasource.url=jdbc:postgresql://localhost:5432/timetable_db?currentSchema=public&options=-c%20timezone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.data-source-properties.timezone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ORM Configuration
# 'validate' ensures Spring Boot checks that your Java entities perfectly match the Docker tables we created
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

